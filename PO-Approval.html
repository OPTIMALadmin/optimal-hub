<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PO Approval Tool — OPTIMAL</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#181c24;--surface2:#1e2330;--surface3:#252b38;--border:#2a3040;--border2:#3a4255;
  --text:#e0e6f0;--text2:#8a95a8;--text3:#4a5568;
  --cyan:#00d4aa;--cyan-dim:rgba(0,212,170,0.12);--cyan-border:rgba(0,212,170,0.3);
  --green:#39d353;--green-dim:rgba(57,211,83,0.1);--green-border:rgba(57,211,83,0.3);
  --amber:#f5a623;--amber-dim:rgba(245,166,35,0.1);--amber-border:rgba(245,166,35,0.3);
  --red:#e05252;--red-dim:rgba(224,82,82,0.1);--red-border:rgba(224,82,82,0.3);
  --blue:#4a9eff;--blue-dim:rgba(74,158,255,0.1);--blue-border:rgba(74,158,255,0.3);
  --radius:4px;--radius-lg:6px;
  --shadow-lg:0 8px 32px rgba(0,0,0,0.5);
  --font:'JetBrains Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;line-height:1.5}
.app{display:flex;min-height:100vh;flex-direction:column}

/* Top header bar */
.topbar{height:70px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:20px;position:fixed;top:0;left:0;right:0;z-index:200;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:var(--text)}
.topbar-title span{color:var(--cyan)}
.topbar-sep{width:1px;height:24px;background:var(--border);flex-shrink:0}
.topbar-user{font-size:11px;color:var(--text2);letter-spacing:0.05em}
.topbar-user strong{color:var(--cyan);font-weight:500}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.topbar-logo{display:flex;align-items:center;gap:10px}
.topbar-builddate{font-size:10px;color:var(--text3);letter-spacing:0.08em}

/* Optimal Group logo SVG inline */
.optimal-logo{height:32px;width:auto;opacity:0.85}

/* Layout below topbar */
.app-body{display:flex;margin-top:70px;min-height:calc(100vh - 70px)}

/* Sidebar */
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:fixed;height:calc(100vh - 70px);top:70px;left:0;z-index:100;overflow-y:auto}
.sidebar-user{padding:16px 18px;border-bottom:1px solid var(--border)}
.sidebar-user .name{font-size:12px;font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:0.06em}
.sidebar-user .role{font-size:10px;color:var(--cyan);margin-top:3px;letter-spacing:0.06em}
nav{flex:1;padding:8px 0}
nav a{display:flex;align-items:center;gap:10px;padding:9px 18px;color:var(--text2);text-decoration:none;font-size:11px;cursor:pointer;transition:all 0.12s;border:none;background:none;width:100%;text-align:left;font-family:var(--font);letter-spacing:0.06em;text-transform:uppercase;border-left:2px solid transparent}
nav a:hover{background:var(--surface2);color:var(--text);border-left-color:var(--border2)}
nav a.active{background:var(--cyan-dim);color:var(--cyan);border-left-color:var(--cyan)}
nav a svg{width:14px;height:14px;flex-shrink:0}
.nav-section{padding:14px 18px 4px;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-top:4px}
.sidebar-footer{padding:14px 18px;border-top:1px solid var(--border)}
.logout-btn{background:transparent;border:1px solid var(--border);color:var(--text2);padding:8px 12px;border-radius:var(--radius);cursor:pointer;font-size:10px;font-family:var(--font);width:100%;text-align:left;transition:all 0.12s;display:flex;align-items:center;gap:8px;letter-spacing:0.06em;text-transform:uppercase}
.logout-btn:hover{border-color:var(--red-border);color:var(--red);background:var(--red-dim)}

/* Main content */
.main{margin-left:220px;flex:1;padding:28px 32px;min-height:calc(100vh - 70px);max-width:calc(100vw - 220px)}
.page-header{margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.page-header h2{font-size:14px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text)}
.page-header h2 span{color:var(--cyan)}
.page-header p{color:var(--text2);margin-top:4px;font-size:11px;letter-spacing:0.04em}

/* Login */
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);flex-direction:column;gap:0}
.login-topbar{width:100%;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0}
.login-topbar-left{font-size:14px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text)}
.login-topbar-left span{color:var(--cyan)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px;width:380px;margin-top:56px}
.login-logo-wrap{text-align:center;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.login-logo-wrap h1{font-size:12px;font-weight:600;color:var(--text2);margin-top:14px;letter-spacing:0.12em;text-transform:uppercase}

/* Forms */
.form-group{margin-bottom:16px}
label{display:block;font-size:10px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.08em}
input[type=text],input[type=password],input[type=email],input[type=number],select,textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:12px;background:var(--surface2);color:var(--text);transition:border-color 0.12s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 2px var(--cyan-dim)}
select option{background:var(--surface2)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
input[type=checkbox]{width:auto;margin-right:4px;accent-color:var(--cyan)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;transition:all 0.12s;text-decoration:none;text-transform:uppercase;letter-spacing:0.06em}
.btn svg{width:13px;height:13px;flex-shrink:0}
.btn-primary{background:var(--cyan);color:#0f1117;border-color:var(--cyan)}.btn-primary:hover{background:#00bfa0}
.btn-success{background:var(--green-dim);color:var(--green);border-color:var(--green-border)}.btn-success:hover{background:var(--green);color:#0f1117}
.btn-danger{background:var(--red-dim);color:var(--red);border-color:var(--red-border)}.btn-danger:hover{background:var(--red);color:#fff}
.btn-outline{background:transparent;border-color:var(--border);color:var(--text2)}.btn-outline:hover{border-color:var(--border2);color:var(--text);background:var(--surface2)}
.btn-blue{background:var(--blue-dim);color:var(--blue);border-color:var(--blue-border)}.btn-blue:hover{background:var(--blue);color:#fff}
.btn-sm{padding:5px 10px;font-size:10px}
.btn:disabled{opacity:0.3;cursor:not-allowed}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.stat-card .label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;font-weight:600}
.stat-card .value{font-size:28px;font-weight:700;letter-spacing:-0.02em;color:var(--text)}

/* Tables */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:9px 12px;border-bottom:1px solid var(--border);font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);font-weight:600;white-space:nowrap;background:var(--surface2)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface2)}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:2px;font-size:10px;font-weight:600;white-space:nowrap;text-transform:uppercase;letter-spacing:0.06em;border:1px solid}
.badge-blue{background:var(--blue-dim);color:var(--blue);border-color:var(--blue-border)}
.badge-green{background:var(--green-dim);color:var(--green);border-color:var(--green-border)}
.badge-amber{background:var(--amber-dim);color:var(--amber);border-color:var(--amber-border)}
.badge-red{background:var(--red-dim);color:var(--red);border-color:var(--red-border)}
.badge-gray{background:var(--surface3);color:var(--text2);border-color:var(--border)}
.badge-cyan{background:var(--cyan-dim);color:var(--cyan);border-color:var(--cyan-border)}

/* PO Detail */
.po-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.po-field{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px}
.po-field .key{font-size:9px;color:var(--text3);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em}
.po-field .val{font-size:13px;font-weight:500;word-break:break-word;color:var(--text)}
.section-title{font-size:9px;text-transform:uppercase;letter-spacing:0.12em;color:var(--cyan);margin-bottom:12px;font-weight:700;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* Approval level cards */
.level-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}
.level-card{border:1px solid var(--border);border-radius:var(--radius);padding:14px;opacity:0.3;transition:all 0.2s;background:var(--surface2)}
.level-card.active{opacity:1;border-color:var(--cyan-border);background:var(--cyan-dim);box-shadow:0 0 12px var(--cyan-dim)}
.level-card.approved{opacity:1;border-color:var(--green-border);background:var(--green-dim)}
.level-card.rejected{opacity:1;border-color:var(--red-border);background:var(--red-dim)}
.level-card h4{font-size:11px;font-weight:700;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.06em}
.level-card p{font-size:10px;color:var(--text2)}
.level-card .status-label{margin-top:8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--cyan)}

/* Alerts */
.alert{padding:11px 14px;border-radius:var(--radius);font-size:11px;margin-bottom:16px;line-height:1.6;border:1px solid}
.alert-success{background:var(--green-dim);color:var(--green);border-color:var(--green-border)}
.alert-error{background:var(--red-dim);color:var(--red);border-color:var(--red-border)}
.alert-info{background:var(--blue-dim);color:var(--blue);border-color:var(--blue-border)}
.alert-warning{background:var(--amber-dim);color:var(--amber);border-color:var(--amber-border)}

/* Approval stamp */
.approval-stamp{position:relative;overflow:hidden;border:1px solid var(--green-border);background:var(--green-dim);border-radius:var(--radius);padding:18px;margin-bottom:16px}
.approval-stamp .stamp-text{position:absolute;right:-10px;top:50%;transform:translateY(-50%) rotate(-12deg);font-size:48px;font-weight:900;color:rgba(57,211,83,0.08);white-space:nowrap;pointer-events:none;letter-spacing:6px;text-transform:uppercase}

/* Timeline */
.timeline{padding:0}
.timeline-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.timeline-item:last-child{border-bottom:none}
.timeline-dot{width:28px;height:28px;border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;border:1px solid var(--border);background:var(--surface2)}
.timeline-body .who{font-size:11px;font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:0.04em}
.timeline-body .when{font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--font)}
.timeline-body .what{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.5}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;width:480px;max-width:100%;box-shadow:var(--shadow-lg)}
.modal h3{font-size:13px;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.08em;color:var(--cyan)}
.modal .modal-desc{color:var(--text2);font-size:11px;margin-bottom:16px;line-height:1.7}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

/* Upload page */
.upload-options{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.upload-option{border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;cursor:pointer;transition:all 0.15s;background:var(--surface)}
.upload-option:hover{border-color:var(--cyan-border);background:var(--cyan-dim)}
.upload-option .opt-icon{font-size:32px;margin-bottom:12px}
.upload-option h3{font-size:12px;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.08em;color:var(--cyan)}
.upload-option p{font-size:11px;color:var(--text2);line-height:1.7;margin-bottom:14px}
.upload-option .steps{border-top:1px solid var(--border);padding-top:12px;display:flex;flex-direction:column;gap:7px}
.upload-option .step{display:flex;align-items:flex-start;gap:8px}
.step-num{width:16px;height:16px;border-radius:2px;background:var(--cyan);color:#0f1117;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-text{font-size:11px;color:var(--text2);line-height:1.5}

/* PDF import banner */
.pdf-ready-banner{background:var(--green-dim);border:1px solid var(--green-border);border-radius:var(--radius-lg);padding:16px 20px;display:flex;align-items:center;gap:14px;margin-bottom:18px}
.pdf-ready-banner .pdf-icon{font-size:28px;flex-shrink:0}
.pdf-ready-banner h3{font-size:12px;font-weight:700;color:var(--green);margin-bottom:2px;text-transform:uppercase;letter-spacing:0.06em}
.pdf-ready-banner p{font-size:11px;color:var(--text2)}

/* Review form */
.review-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.level-indicator{border-radius:var(--radius);padding:11px 14px;display:flex;align-items:center;gap:10px;margin-bottom:18px;background:var(--surface2);border:1px solid var(--border)}

/* Items editor */
.items-header-row{display:grid;grid-template-columns:1fr 70px 100px 100px 32px;gap:8px;margin-bottom:5px;padding:0 2px}
.items-header-row span{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;font-weight:600}
.item-row{display:grid;grid-template-columns:1fr 70px 100px 100px 32px;gap:8px;align-items:center;margin-bottom:7px}
.item-row input{padding:7px 9px;font-size:11px}
.del-btn{background:var(--red-dim);border:1px solid var(--red-border);color:var(--red);border-radius:var(--radius);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;height:32px;width:32px;flex-shrink:0;font-weight:400;line-height:1;padding:0}
.del-btn:hover{background:var(--red);color:#fff}

/* User management */
.user-row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.user-row:last-child{border-bottom:none}
.user-avatar{width:34px;height:34px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;border:1px solid var(--border)}
.user-info{flex:1;min-width:160px}
.user-info .uname{font-size:12px;font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:0.04em}
.user-info .uemail{font-size:10px;color:var(--text3);margin-top:2px}

/* Parameters */
.param-card{border-radius:var(--radius);padding:18px;border:1px solid}
.param-card h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px}
.param-card .amount{font-size:20px;font-weight:700;margin-bottom:4px;color:var(--text)}
.param-card .desc{font-size:10px;color:var(--text2);margin-bottom:12px;letter-spacing:0.04em}
.approver-chip{font-size:10px;background:var(--surface3);padding:2px 8px;border-radius:2px;display:inline-block;margin:2px;color:var(--text2);border:1px solid var(--border);font-family:var(--font)}

/* Toast */
#toast{position:fixed;top:70px;right:20px;z-index:9999;pointer-events:none}
.toast-item{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:var(--radius);font-size:11px;margin-bottom:7px;box-shadow:var(--shadow-lg);animation:slideIn 0.15s ease;max-width:300px;line-height:1.5;font-family:var(--font);letter-spacing:0.03em}
.toast-item.success{border-color:var(--green-border);color:var(--green);background:var(--green-dim)}
.toast-item.error{border-color:var(--red-border);color:var(--red);background:var(--red-dim)}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{opacity:1}to{opacity:0;transform:translateX(110%)}}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

@media(max-width:900px){
  .sidebar{width:190px}.main{margin-left:190px;padding:20px}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .po-grid,.review-grid{grid-template-columns:1fr}
  .upload-options,.level-cards{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="toast"></div>
<div id="root"></div>
<script>
// ============================================================
// DATA & STATE
// ============================================================
const INITIAL_USERS = [
  { id:'admin',  login:'admin',           pass:'adminOPTIMAL',           name:'Administrator',   email:'POApproval@optimal.pt',         role:'admin', levels:[] },
  { id:'u1',     login:'antonio.reis',    pass:'antonio.reisOPTIMAL',    name:'António Reis',    email:'antonio.reis@optimal.pt',        role:'user',  levels:[1,2,3] },
  { id:'u2',     login:'manuel.torres',   pass:'manuel.torresOPTIMAL',   name:'Manuel Torres',   email:'manuel.torrestest@optimal.pt',   role:'user',  levels:[1,2,3] },
  { id:'u3',     login:'jorge.subtil',    pass:'jorge.subtilOPTIMAL',    name:'Jorge Subtil',    email:'jorge.subtiltest@optimal.pt',    role:'user',  levels:[1] },
  { id:'u4',     login:'celeste.pereira', pass:'celeste.pereiraOPTIMAL', name:'Celeste Pereira', email:'celeste.pereiratest@optimal.pt', role:'user',  levels:[1,2] },
  { id:'u5',     login:'mauro.lopes',     pass:'mauro.lopesOPTIMAL',     name:'Mauro Lopes',     email:'mauro.lopestest@optimal.pt',     role:'user',  levels:[] },
  { id:'u6',     login:'bruno.carvalho', pass:'bruno.carvalhoASC',       name:'Bruno Carvalho',  email:'bruno.carvalhotest@optimal.pt',  role:'user',  levels:[] },
  { id:'u7',     login:'ivo.costa',      pass:'ivo.costaOPTIMAL',        name:'Ivo Costa',       email:'ivo.costatest@optimal.pt',       role:'user',  levels:[] },
  { id:'u8',     login:'joao.ferreira',  pass:'joao.ferreiraOPTIMAL',    name:'João Ferreira',   email:'joao.ferreiratest@optimal.pt',   role:'user',  levels:[] },
  { id:'u9',     login:'joao.pinto',     pass:'joao.pintoOPTIMAL',       name:'João Pinto',      email:'joao.pintotest@optimal.pt',      role:'user',  levels:[] },
];

// ── Approval level thresholds ────────────────────────────────────────────────
const APPROVAL_LEVELS = [
  { level:1, label:'Level 1', min:0,     max:750,    desc:'€0 – €750' },
  { level:2, label:'Level 2', min:751,   max:10000,  desc:'€751 – €10,000' },
  { level:3, label:'Level 3', min:10001, max:200000, desc:'€10,001 – €200,000' },
];

// ── Company list ─────────────────────────────────────────────────────────────
const COMPANIES = [
  'OPTIMAL GROUP',
  'OPTIMAL STRUCTURAL SOLUTIONS',
  'OPTIMAL SPACE',
  'OPTIMAL HIGH VOLUME',
  'OPTIMAL MARINE',
  'ATLANTIC SPACEPORT CONSORTIUM',
];

// ── Per-company approval matrix ───────────────────────────────────────────────
// Structure: company -> level -> array of "approver groups"
// Each group is an array of logins; ALL logins in a group must approve (joint approval)
// Multiple groups = ANY single group can satisfy the requirement
const APPROVAL_MATRIX = {
  'OPTIMAL GROUP': {
    1: [['jorge.subtil'], ['antonio.reis'], ['manuel.torres']],
    2: [['antonio.reis'], ['manuel.torres']],
    3: [['antonio.reis','manuel.torres']],

// ---- Persistence (localStorage) ----
function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('po_tool_optimal') || '{}');
    state.users   = s.users   || JSON.parse(JSON.stringify(INITIAL_USERS));
    state.pos     = s.pos     || [];
    state.archive = s.archive || [];
    state.apiKey  = localStorage.getItem('po_tool_apikey') || '';

    // Migration: add any new users from INITIAL_USERS that don't exist in saved state
    INITIAL_USERS.forEach(iu => {
      if (!state.users.find(u => u.id === iu.id || u.login === iu.login)) {
        state.users.push({...iu});
      }
    });

  } catch(e) {
    state.users = JSON.parse(JSON.stringify(INITIAL_USERS));
    state.pos = []; state.archive = [];
  }
}
function saveState() {
  try {
    localStorage.setItem('po_tool_optimal', JSON.stringify({users:state.users,pos:state.pos,archive:state.archive}));
    if (state.apiKey) localStorage.setItem('po_tool_apikey', state.apiKey);
  } catch(e) {}
}

// ---- Helpers ----
function getLevel(amount) {
  if (amount <= 750)   return 1;
  if (amount <= 10000) return 2;
  return 3;
}

// Get the approval groups for a given company + level
// Returns array of groups; each group = array of logins (ALL must approve)
function normaliseCompany(name) {
  return String(name||'')
    .toUpperCase()
    .trim()
    // Strip common legal suffixes
    .replace(/\b(LDA\.?|SA\.?|S\.A\.?|LTD\.?|LLC\.?|INC\.?|PLC\.?|GMBH\.?|SRL\.?|SL\.?|BV\.?|NV\.?)\s*$/,'')
    .trim();
}

function getApprovalGroups(company, level) {
  if (!company || !level) return [];
  const normInput = normaliseCompany(company);
  // 1. Exact match after normalisation
  let key = Object.keys(APPROVAL_MATRIX).find(k => normaliseCompany(k) === normInput);
  // 2. Input starts with matrix key (e.g. "OPTIMAL STRUCTURAL SOLUTIONS LDA" starts with "OPTIMAL STRUCTURAL SOLUTIONS")
  if (!key) key = Object.keys(APPROVAL_MATRIX).find(k => normInput.startsWith(normaliseCompany(k)));
  // 3. Matrix key starts with input
  if (!key) key = Object.keys(APPROVAL_MATRIX).find(k => normaliseCompany(k).startsWith(normInput));
  if (!key) {
    console.warn('[Approval] No matrix entry for company:', company, '(normalised:', normInput+')');
    return [];
  }
  return APPROVAL_MATRIX[key][Number(level)] || [];
}

// Get all unique logins that are relevant approvers for a company+level
// (used to send notification emails)
function getApproverLogins(company, level) {
  const groups = getApprovalGroups(company, level);
  const logins = new Set();
  groups.forEach(g => g.forEach(l => logins.add(l)));
  return [...logins];
}

// Resolve logins to user objects
function getUsersByLogins(logins) {
  return logins.map(l => state.users.find(u => u.login === l)).filter(Boolean);
}

// Check if current user can approve this PO
// User can approve if they are in ANY approver group for this company+level
function canUserApprove(user, po) {
  if (user.role === 'admin') return true;
  const groups = getApprovalGroups(po.company, po.approvalLevel);
  return groups.some(group => group.includes(user.login));
}

// Check if approval is complete:
// A group is "satisfied" when all its members have approved
// PO is fully approved when ANY group is satisfied
function isApprovalComplete(po) {
  const groups = getApprovalGroups(po.company, po.approvalLevel);
  if (!groups.length) return false;
  const approvedBy = po.approvals || []; // array of logins who have approved
  return groups.some(group => group.every(login => approvedBy.includes(login)));
}

// Get which groups are still pending and which are satisfied
function getApprovalStatus(po) {
  const groups = getApprovalGroups(po.company, po.approvalLevel);
  const approvedBy = po.approvals || [];
  return groups.map(group => ({
    group,
    satisfied: group.every(l => approvedBy.includes(l)),
    pending:   group.filter(l => !approvedBy.includes(l)),
    done:      group.filter(l =>  approvedBy.includes(l)),
  }));
}

// Count POs pending current user's action
function pendingCount() {
  const u = state.currentUser; if (!u) return 0;
  return state.pos.filter(p => {
    if (p.status !== 'pending') return false;
    if (u.role === 'admin') return true;
    const groups = getApprovalGroups(p.company, p.approvalLevel);
    // User is relevant if they are in any group AND haven't approved yet
    const approvedBy = p.approvals || [];
    return groups.some(g => g.includes(u.login) && !approvedBy.includes(u.login));
  }).length;
}

function fmtDateTime(iso) { if(!iso)return'—'; return new Date(iso).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }

  const t = document.createElement('div');

function doLogin() {
  const login = document.getElementById('lu')?.value.trim();
  const pass  = document.getElementById('lp')?.value;
  const user  = state.users.find(u=>u.login===login&&u.pass===pass);
  if (!user) { document.getElementById('login-err').innerHTML='<div class="alert alert-error">Invalid username or password.</div>'; return; }
  state.loggedIn = true; state.currentUser = user; state.page = 'dashboard';
  state.reviewData = null; state.reviewItems = []; state.modal = null;
  render();
}

function nav(page) { state.page=page; state.modal=null; render(); }
function doLogout() { state.loggedIn=false; state.currentUser=null; state.reviewData=null; state.modal=null; render(); }

// ============================================================
// DASHBOARD
// ============================================================
function renderDashboard() {
  const u=state.currentUser, isAdmin=u.role==='admin';
  const myPending = state.pos.filter(p => {
    if (p.status !== 'pending') return false;
    if (isAdmin) return true;
    const groups = getApprovalGroups(p.company, p.approvalLevel);
    const approvedBy = p.approvals || [];
    return groups.some(g => g.includes(u.login) && !approvedBy.includes(u.login));
  });
  const div = document.createElement('div');

  div.innerHTML = `
    <div class="page-header">
      <h2>Welcome back, ${esc(u.name.split(' ')[0])}</h2>
      <p>${new Date().toLocaleDateString('en-GB',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="label">Total POs</div><div class="value">${state.pos.length}</div></div>
      <div class="stat-card"><div class="label">Pending</div><div class="value" style="color:var(--amber)">${state.pos.filter(p=>p.status==='pending').length}</div></div>
      <div class="stat-card"><div class="label">Approved</div><div class="value" style="color:var(--green)">${state.pos.filter(p=>p.status==='approved').length}</div></div>
      <div class="stat-card"><div class="label">Awaiting Me</div><div class="value" style="color:var(--blue)">${myPending.length}</div></div>
    </div>`;

  if (myPending.length) {
    const sec = document.createElement('div'); sec.style.marginBottom='28px';
    sec.innerHTML = `<h3 style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--amber)">⏳ Awaiting your approval</h3>`;
    const card = document.createElement('div'); card.className='card'; card.style.padding='0';
    card.appendChild(buildPOTable(myPending));
    sec.appendChild(card); div.appendChild(sec);
  }

  const recent = state.archive.filter(e=>e.type!=='email').slice(0,10);
  const sec2 = document.createElement('div');
  sec2.innerHTML = `<h3 style="font-size:14px;font-weight:700;margin-bottom:12px">Recent Activity</h3>`;
  const card2 = document.createElement('div'); card2.className='card';
  if (!recent.length) {
    card2.innerHTML='<p style="color:var(--text3);text-align:center;padding:24px;font-size:13px">No activity yet. Create your first PO to get started.</p>';
  } else {
    const tl=document.createElement('div'); tl.className='timeline';
    recent.forEach(ev=>tl.appendChild(buildTimelineItem(ev)));
    card2.appendChild(tl);
  }
  sec2.appendChild(card2); div.appendChild(sec2);
  return div;
}

// ============================================================
// UPLOAD PAGE
// ============================================================
function renderUpload() {
  const div = document.createElement('div');

  if (state.reviewData) { div.appendChild(renderReviewForm()); return div; }

  div.innerHTML = `<div class="page-header"><h2>New Purchase Order</h2><p>Choose how you'd like to add your PO to the system</p></div>`;

  const opts = document.createElement('div'); opts.className='upload-options';

  // Option A — PDF extraction
  const optA = document.createElement('div'); optA.className='upload-option';
  optA.innerHTML = `
    <div class="opt-icon">📄</div>
    <h3>Upload PDF</h3>
    <p>Select a PDF file from your computer. Claude AI will automatically read it and extract all PO fields for your review.</p>
    <div style="position:relative">
      <input type="file" id="pdf-file-input" accept=".pdf,application/pdf" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;z-index:2">
      <button class="btn btn-blue" style="width:100%;justify-content:center;pointer-events:none">
        ${svgIcon('upload')} Select PDF file
      </button>
    </div>
    <p style="font-size:11px;color:var(--text3);margin-top:8px;text-align:center">PDF is read locally — your file never leaves your computer</p>
    ${!state.apiKey ? `<div class="alert alert-warning" style="margin-top:12px;font-size:12px">⚠️ No API key set. <a onclick="nav('apisettings')" style="color:var(--amber);font-weight:600;cursor:pointer">Configure it here</a> before uploading a PDF.</div>` : ''}`;

  // Option B — Manual
  const optB = document.createElement('div'); optB.className='upload-option'; optB.style.cursor='pointer';
  optB.innerHTML = `
    <div class="opt-icon">✏️</div>
    <h3>Fill in manually</h3>
    <p>Enter PO information directly into a form. Add all fields and line items yourself.</p>
    <div class="steps">
      <div class="step"><div class="step-num">1</div><div class="step-text">Click to open the entry form</div></div>
      <div class="step"><div class="step-num">2</div><div class="step-text">Fill in PO header fields and line items</div></div>
      <div class="step"><div class="step-num">3</div><div class="step-text">Review and submit for approval</div></div>
    </div>`;
  optB.onclick = () => openManualForm();

  opts.appendChild(optA); opts.appendChild(optB); div.appendChild(opts);

  // Wire PDF input
  setTimeout(()=>{
    const inp = document.getElementById('pdf-file-input');
    if (inp) inp.addEventListener('change', e=>{ if(e.target.files[0]) handlePDF(e.target.files[0]); });
    // Drag & drop on optA
    optA.addEventListener('dragover', e=>{ e.preventDefault(); optA.style.borderColor='var(--blue)'; optA.style.background='var(--blue-bg)'; });
    optA.addEventListener('dragleave', ()=>{ optA.style.borderColor=''; optA.style.background=''; });
    optA.addEventListener('drop', e=>{ e.preventDefault(); optA.style.borderColor=''; optA.style.background=''; const f=e.dataTransfer.files[0]; if(f&&f.type==='application/pdf')handlePDF(f); });
  },30);

  return div;
}

function handlePDF(file) {
  const main = document.querySelector('.main');
  const loadDiv = document.createElement('div');
  loadDiv.id = 'pdf-loading';
  loadDiv.innerHTML = `
    <div class="page-header"><h2>Reading PDF…</h2><p>${esc(file.name)}</p></div>
    <div class="card" style="text-align:center;padding:48px">
      <div style="font-size:40px;margin-bottom:16px">⏳</div>
      <h3 style="font-weight:600;margin-bottom:8px">Extracting PO data</h3>
      <p style="color:var(--text2);font-size:13px">Claude AI is reading your PDF. This takes a few seconds…</p>
    </div>`;
  main.innerHTML = ''; main.appendChild(loadDiv);

  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result.split(',')[1];
    try {
      const data = await extractWithClaude(base64, file.name);
      state.reviewData = data;
      state.reviewItems = (data.items||[]).map((it,i)=>({...it, _id:i}));
      if (!state.reviewItems.length) state.reviewItems = [{_id:0,description:'',qty:1,unitPrice:0,total:0}];
      state.reviewSource  = 'pdf';
      state.reviewPdfB64  = base64;        // ← store original PDF
      state.reviewPdfName = file.name;
      state.page = 'upload';
      render();
    } catch(err) {
      toast('PDF extraction failed: '+err.message+'. Please fill in manually.', 'error', 7000);
      openManualForm();
    }
  };
  reader.readAsDataURL(file);
}

async function extractWithClaude(base64, filename) {
  const prompt = `Extract all fields from this Purchase Order PDF and return ONLY a valid JSON object — no markdown, no explanation.

JSON structure:
{
  "company": "company issuing the PO",
  "poNumber": "PO number",
  "supplier": "supplier name",
  "supplierAddress": "full supplier address",
  "supplierNIF": "supplier NIF or VAT number",
  "project": "project name or code",
  "netTotal": <number>,
  "total": <number, total including taxes>,
  "currency": "3-letter code e.g. EUR",
  "paymentTerms": "payment terms",
  "items": [{"description":"...","qty":<number>,"unitPrice":<number>,"total":<number>}]
}

Use "" for missing strings, 0 for missing numbers. Return only the JSON.`;

  if (!state.apiKey) throw new Error('No API key configured. Please go to Admin → API Key and enter your Anthropic API key.');

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type':'application/json',
      'x-api-key': state.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: 2000,
      messages: [{
        role: 'user',
        content: [
          { type:'document', source:{ type:'base64', media_type:'application/pdf', data:base64 } },
          { type:'text', text:prompt }
        ]
      }]
    })
  });

  if (!resp.ok) {
    const err = await resp.json().catch(()=>({}));
    throw new Error(err.error?.message||`API error ${resp.status}`);
  }
  const result = await resp.json();
  const text = result.content.map(c=>c.text||'').join('');
  const clean = text.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

// REVIEW FORM
// ============================================================
function renderReviewForm() {

  const card = document.createElement('div'); card.className='card';

  // Fields grid
  const grid = document.createElement('div'); grid.className='review-grid';
  const fields = [
    { id:'f-company',  label:'Company Issuing PO', val:ex.company||'',         placeholder:'', isCompanySelect:true },
    { id:'f-ponum',    label:'PO Number',           val:ex.poNumber||'',        placeholder:'e.g. PO-2024-001' },
    { id:'f-supplier', label:'Supplier Name',       val:ex.supplier||'',        placeholder:'Supplier company name' },
    { id:'f-addr',     label:'Supplier Address',    val:ex.supplierAddress||'', placeholder:'Full address' },
    { id:'f-nif',      label:'Supplier NIF / VAT',  val:ex.supplierNIF||'',     placeholder:'e.g. PT123456789' },
    { id:'f-project',  label:'Project',             val:ex.project||'',         placeholder:'Project name or code' },
    { id:'f-net',      label:'Net Total',           val:ex.netTotal||0,         type:'number', placeholder:'0.00' },
    { id:'f-total',    label:'Total (incl. VAT)',   val:ex.total||0,            type:'number', placeholder:'0.00', bold:true },
    { id:'f-currency', label:'Currency',            val:ex.currency||'EUR',     isSelect:true, options:['EUR','USD','GBP','CHF'] },
    { id:'f-terms',    label:'Payment Terms',       val:ex.paymentTerms||'',    placeholder:'e.g. 30 days net' },
  ];
  fields.forEach(f=>{
    const fg = document.createElement('div'); fg.className='form-group'; fg.style.marginBottom='0';
    if (f.isSelect) {
      fg.innerHTML = `<label>${esc(f.label)}</label><select id="${f.id}">${f.options.map(o=>`<option ${o===f.val?'selected':''}>${o}</option>`).join('')}</select>`;
    } else if (f.isCompanySelect) {
      const matchedCompany = COMPANIES.find(c => c.toLowerCase() === (f.val||'').toLowerCase()) || '';
      fg.innerHTML = `<label>${esc(f.label)}</label><select id="${f.id}">
        <option value="">— Select company —</option>
        ${COMPANIES.map(c=>`<option ${(matchedCompany===c||f.val===c)?'selected':''}>${c}</option>`).join('')}
        ${f.val && !COMPANIES.includes(f.val) ? `<option selected>${f.val}</option>` : ''}
      </select>`;
    } else {
      fg.innerHTML = `<label>${esc(f.label)}</label><input id="${f.id}" type="${f.type||'text'}" value="${esc(f.val)}" placeholder="${esc(f.placeholder||'')}"${f.bold?' style="font-weight:700"':''}>`;
    }
    grid.appendChild(fg);
  });
  card.appendChild(grid);

  // Approval level indicator
  const lvlDiv = document.createElement('div'); lvlDiv.id='lvl-ind'; lvlDiv.className='level-indicator'; lvlDiv.style.marginTop='16px';
  card.appendChild(lvlDiv);

  // Items
  const itSec = document.createElement('div'); itSec.style.marginTop='8px';
  itSec.innerHTML = `<div class="section-title" style="margin-bottom:10px">Line Items</div>`;
  const itWrap = document.createElement('div'); itWrap.id='items-wrap';
  itSec.appendChild(itWrap);
  const addBtn = document.createElement('button'); addBtn.className='btn btn-outline btn-sm'; addBtn.style.marginTop='10px'; addBtn.textContent='+ Add item';
  addBtn.onclick = () => {
    const maxId = state.reviewItems.reduce((m,i)=>Math.max(m,i._id),0);
    state.reviewItems.push({_id:maxId+1,description:'',qty:1,unitPrice:0,total:0});
    rebuildItems();
  };
  itSec.appendChild(addBtn);
  card.appendChild(itSec);

  // Actions
  const actDiv = document.createElement('div'); actDiv.style.cssText='display:flex;gap:10px;margin-top:24px;flex-wrap:wrap';
  const createBtn = document.createElement('button'); createBtn.className='btn btn-success';
  createBtn.innerHTML = `${svgIcon('check')} Create PO`;
  createBtn.onclick = () => confirmCreatePO();
  const cancelBtn = document.createElement('button'); cancelBtn.className='btn btn-outline'; cancelBtn.textContent='Cancel';
  cancelBtn.onclick = () => { state.reviewData=null; state.reviewItems=[]; state.page='upload'; render(); };
  actDiv.appendChild(createBtn); actDiv.appendChild(cancelBtn);
  card.appendChild(actDiv);
  wrap.appendChild(card);

  // Wire live level indicator
  setTimeout(()=>{
    rebuildItems();
    updateLevelIndicator();
    const ti = document.getElementById('f-total');
    if (ti) ti.addEventListener('input', updateLevelIndicator);
  },30);

  return wrap;
}

function updateLevelIndicator() {
  const t = parseFloat(document.getElementById('f-total')?.value)||0;
  const lvl = getLevel(t);
  const lm  = {1:'Level 1 — €0 to €750',2:'Level 2 — €751 to €10,000',3:'Level 3 — €10,001 to €200,000'};
  const lc  = {1:'badge-blue',2:'badge-amber',3:'badge-red'};
  const ld  = document.getElementById('lvl-ind');
  if (ld) ld.innerHTML = `<span style="font-size:12px;color:var(--text2);font-weight:500">Approval level required:</span><span class="badge ${lc[lvl]}" style="margin-left:8px">${lm[lvl]}</span>`;
}

function rebuildItems() {
  const wrap = document.getElementById('items-wrap'); if (!wrap) return;
  wrap.innerHTML = '';
  if (!state.reviewItems.length) return;
  const hdr = document.createElement('div'); hdr.className='items-header-row';
  hdr.innerHTML='<span>Description</span><span>Qty</span><span>Unit Price</span><span>Total</span><span></span>';
  wrap.appendChild(hdr);
  state.reviewItems.forEach((item,idx)=>{
    const row = document.createElement('div'); row.className='item-row';
    row.innerHTML = `
      <input type="text"   value="${esc(item.description||'')}" placeholder="Item description" data-f="description" data-i="${idx}">
      <input type="number" value="${item.qty||1}"               min="1" step="1"    data-f="qty"         data-i="${idx}">
      <input type="number" value="${item.unitPrice||0}"          step="0.01"         data-f="unitPrice"   data-i="${idx}">
      <input type="number" value="${item.total||0}"              step="0.01"         data-f="total"       data-i="${idx}">
      <button class="del-btn" data-di="${idx}" title="Remove row">×</button>`;
    row.querySelectorAll('input').forEach(inp=>{ inp.addEventListener('input',e=>{ state.reviewItems[+e.target.dataset.i][e.target.dataset.f]=e.target.value; }); });
    row.querySelector('.del-btn').onclick = e => { state.reviewItems.splice(+e.target.dataset.di,1); rebuildItems(); };
    wrap.appendChild(row);
  });
}

function confirmCreatePO() {
  const g = id => document.getElementById(id)?.value?.trim()||'';
  const total = parseFloat(g('f-total'))||0;
  if (!g('f-company')) { toast('Company name is required.','error'); return; }
  if (!g('f-supplier')) { toast('Supplier name is required.','error'); return; }
  if (!total) { toast('Total amount is required.','error'); return; }

  const po = {
    id: 'PO-'+uid(),
    company:         g('f-company'),
    poNumber:        g('f-ponum'),
    supplier:        g('f-supplier'),
    supplierAddress: g('f-addr'),
    supplierNIF:     g('f-nif'),
    project:         g('f-project'),
    netTotal:        parseFloat(g('f-net'))||0,
    total,
    currency:        g('f-currency')||'EUR',
    paymentTerms:    g('f-terms'),
    items: state.reviewItems.filter(i=>i.description).map(i=>({ description:String(i.description), qty:Number(i.qty)||1, unitPrice:Number(i.unitPrice)||0, total:Number(i.total)||0 })),
    status: 'draft',
    approvalLevel: getLevel(total),
    requestedBy: state.currentUser.id,
    createdAt: new Date().toISOString(),
    requestedAt: null,
    approvedBy: null, approvedAt: null,
    rejectedBy: null, rejectedAt: null,
    rejectionReason: '',
    source: state.reviewSource,
    originalPdfB64:  state.reviewSource === 'pdf' ? state.reviewPdfB64  : null,
    originalPdfName: state.reviewSource === 'pdf' ? state.reviewPdfName : null,
  };

  state.pos.unshift(po);
  addEvent('created', po.id, state.currentUser.id, `PO ${po.poNumber||po.id} created via ${state.reviewSource==='pdf'?'PDF':'manual entry'} (${po.currency} ${po.total})`);
  saveState();
  state.reviewData=null; state.reviewItems=[]; state.reviewSource=null;
  state.reviewPdfB64=null; state.reviewPdfName=null;
  state.page='po-detail'; state.currentPO=po.id;
  toast('PO created successfully!');
  render();
}

function buildPOTable(pos) {
  const wrap = document.createElement('div'); wrap.className='table-wrap';
  if (!pos.length) { wrap.innerHTML='<p style="padding:28px;text-align:center;color:var(--text3)">No purchase orders found.</p>'; return wrap; }
  const tbl = document.createElement('table');
  tbl.innerHTML=`<thead><tr><th>PO Number</th><th>Supplier</th><th>Project</th><th>Amount</th><th>Level</th><th>Status</th><th>Date</th><th></th></tr></thead>`;
  const tbody = document.createElement('tbody');
  pos.forEach(po=>{
    const sm = { draft:'badge-gray', pending:'badge-amber', approved:'badge-green', rejected:'badge-red' };
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-family:monospace;font-size:12px;font-weight:600">${esc(po.poNumber||po.id)}</td>
      <td>${esc(po.supplier||'—')}</td>
      <td style="color:var(--text2)">${esc(po.project||'—')}</td>
      <td style="font-weight:700">${fmtCurrency(po.total,po.currency)}</td>
      <td><span class="badge badge-blue">L${po.approvalLevel}</span></td>
      <td><span class="badge ${sm[po.status]||'badge-gray'}">${po.status.charAt(0).toUpperCase()+po.status.slice(1)}</span></td>
      <td style="color:var(--text3);font-size:12px;white-space:nowrap">${po.requestedAt?fmtDate(po.requestedAt):(po.status==='draft'?'Draft':'—')}</td>
      <td><button class="btn btn-outline btn-sm" onclick="viewPO('${po.id}')">View</button></td>`;
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody); wrap.appendChild(tbl); return wrap;
}
function viewPO(id) { state.page='po-detail'; state.currentPO=id; render(); }

function renderPending() {
  const u=state.currentUser, isAdmin=u.role==='admin';
  const pending = state.pos.filter(p => {
    if (p.status !== 'pending') return false;
    if (isAdmin) return true;
    const groups = getApprovalGroups(p.company, p.approvalLevel);
    const approvedBy = p.approvals || [];
    return groups.some(g => g.includes(u.login) && !approvedBy.includes(u.login));
  });
  const div=document.createElement('div');
  div.innerHTML=`<div class="page-header"><h2>Pending Approval</h2><p>POs awaiting your approval action</p></div>`;
  const card=document.createElement('div'); card.className='card'; card.style.padding='0';
  card.appendChild(buildPOTable(pending)); div.appendChild(card); return div;
}

function renderPODetail() {
  const po = state.pos.find(p=>p.id===state.currentPO);
  if (!po) { const d=document.createElement('div'); d.innerHTML='<p>PO not found.</p>'; return d; }
  const u=state.currentUser, isAdmin=u.role==='admin';
  const isRequester = po.requestedBy===u.id;
  const canApprove  = canUserApprove(u, po) && !(po.approvals||[]).includes(u.login);

  const div=document.createElement('div');
  div.innerHTML = `<button class="btn btn-outline btn-sm" style="margin-bottom:20px" onclick="nav('${isRequester?'pos':'pending'}')">← Back</button>
  <div class="page-header" style="margin-bottom:20px">
    <h2>${esc(po.poNumber||po.id)}</h2>
    <p>${esc(po.company||'')} → ${esc(po.supplier||'')} · Created ${fmtDate(po.createdAt||po.requestedAt)}</p>
  </div>`;

  // Approval level cards
  const lvlSec=document.createElement('div'); lvlSec.style.marginBottom='20px';
  lvlSec.innerHTML=`<div class="section-title">Approval Level</div>`;
  const lc=document.createElement('div'); lc.className='level-cards';
  [1,2,3].forEach(lvl=>{
    const c=document.createElement('div'); c.className='level-card';
    const lm={1:'Level 1<br><small>€0 – €750</small>',2:'Level 2<br><small>€751 – €10,000</small>',3:'Level 3<br><small>€10,001 – €200,000</small>'};
    if (lvl===po.approvalLevel) {
      c.classList.add(po.status==='approved'?'approved':po.status==='rejected'?'rejected':'active');
    }
    c.innerHTML=`<h4>${lm[lvl]}</h4>`;
    if (lvl===po.approvalLevel&&po.status!=='draft'&&po.status!=='pending') {
      c.innerHTML+=`<div class="status-label">${po.status}</div>`;
    }
    lc.appendChild(c);
  });
  lvlSec.appendChild(lc);

  // Approval groups status panel
  if (po.status === 'pending' || po.status === 'approved') {
    const groups = getApprovalStatus(po);
    if (groups.length) {
      const groupPanel = document.createElement('div');
      groupPanel.style.cssText='margin-top:12px;display:flex;flex-direction:column;gap:8px';
      const panelTitle = document.createElement('div');
      panelTitle.style.cssText='font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);font-weight:600;margin-bottom:4px';
      panelTitle.textContent = groups.length > 1 ? 'Approval Groups — Any one group can approve' : 'Required Approvers';
      groupPanel.appendChild(panelTitle);
      groups.forEach((g, i) => {
        const row = document.createElement('div');
        row.style.cssText=`display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius);border:1px solid ${g.satisfied?'var(--green-border)':'var(--border)'};background:${g.satisfied?'var(--green-dim)':'var(--surface2)'}`;
        if (groups.length > 1) {
          const lbl = document.createElement('span');
          lbl.style.cssText='font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;min-width:44px;flex-shrink:0';
          lbl.textContent = 'Option '+('ABCDEFGH'[i]);
          row.appendChild(lbl);
        }
        g.group.forEach(login => {
          const usr = state.users.find(x=>x.login===login);
          const approved = (po.approvals||[]).includes(login);
          const chip = document.createElement('span');
          chip.style.cssText=`font-size:10px;padding:3px 9px;border-radius:2px;font-weight:600;border:1px solid ${approved?'var(--green-border)':'var(--border2)'};background:${approved?'var(--green-dim)':'var(--surface3)'};color:${approved?'var(--green)':'var(--text2)'}`;
          chip.textContent = (approved?'✓ ':'') + (usr?.name||login);
          row.appendChild(chip);
        });
        if (g.satisfied) {
          const done = document.createElement('span');
          done.style.cssText='margin-left:auto;font-size:10px;color:var(--green);font-weight:700;text-transform:uppercase;letter-spacing:0.06em';
          done.textContent='✓ Complete';
          row.appendChild(done);
        }
        groupPanel.appendChild(row);
      });
      lvlSec.appendChild(groupPanel);
    }
  }
  div.appendChild(lvlSec);

  // PO Fields
  const cur=po.currency;
  const infoCard=document.createElement('div'); infoCard.className='card'; infoCard.style.marginBottom='16px';
  infoCard.innerHTML=`<div class="section-title">Purchase Order Details</div>
  <div class="po-grid">
    <div class="po-field"><div class="key">Company</div><div class="val">${esc(po.company||'—')}</div></div>
    <div class="po-field"><div class="key">PO Number</div><div class="val" style="font-family:monospace">${esc(po.poNumber||'—')}</div></div>
    <div class="po-field"><div class="key">Supplier</div><div class="val">${esc(po.supplier||'—')}</div></div>
    <div class="po-field"><div class="key">Supplier Address</div><div class="val">${esc(po.supplierAddress||'—')}</div></div>
    <div class="po-field"><div class="key">Supplier NIF / VAT</div><div class="val" style="font-family:monospace">${esc(po.supplierNIF||'—')}</div></div>
    <div class="po-field"><div class="key">Project</div><div class="val">${esc(po.project||'—')}</div></div>
    <div class="po-field"><div class="key">Net Total</div><div class="val">${fmtCurrency(po.netTotal,cur)}</div></div>
    <div class="po-field"><div class="key">Total (incl. VAT)</div><div class="val" style="font-size:18px;font-weight:700">${fmtCurrency(po.total,cur)}</div></div>
    <div class="po-field"><div class="key">Currency</div><div class="val">${esc(po.currency||'EUR')}</div></div>
    <div class="po-field"><div class="key">Payment Terms</div><div class="val">${esc(po.paymentTerms||'—')}</div></div>
  </div>`;
  div.appendChild(infoCard);

  // Items
  if (po.items?.length) {
    const ic=document.createElement('div'); ic.className='card'; ic.style.marginBottom='16px';
    ic.innerHTML=`<div class="section-title">Line Items</div>`;
    const tw=document.createElement('div'); tw.className='table-wrap';
    tw.innerHTML=`<table><thead><tr><th>Description</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr></thead></table>`;
    const tb=document.createElement('tbody');
    po.items.forEach(it=>{ const tr=document.createElement('tr'); tr.innerHTML=`<td>${esc(it.description)}</td><td>${it.qty}</td><td>${fmtCurrency(it.unitPrice,cur)}</td><td>${fmtCurrency(it.total,cur)}</td>`; tb.appendChild(tr); });
    tw.querySelector('table').appendChild(tb); ic.appendChild(tw); div.appendChild(ic);
  }

  // Approval status
  if (po.status==='approved') {
    const approver=state.users.find(u=>u.id===po.approvedBy);
    const stamp=document.createElement('div'); stamp.className='approval-stamp';
    stamp.innerHTML=`<div class="stamp-text">APPROVED</div>
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:28px">✅</div>
        <div>
          <div style="font-weight:700;color:var(--green);font-size:14px;text-transform:uppercase;letter-spacing:0.06em">PO Approved</div>
          <div style="font-size:11px;color:var(--text2);margin-top:3px">By <strong>${esc(approver?.name||po.approvedBy)}</strong> on ${fmtDateTime(po.approvedAt)}</div>
        </div>
      </div>
      ${po.approvedPdfB64 ? `<button class="btn btn-success btn-sm" id="dl-pdf-btn">⬇ Download Approved PDF</button>` : ''}
    </div>`;
    if (po.approvedPdfB64) {
      stamp.querySelector('#dl-pdf-btn').onclick = () => {
        const link = document.createElement('a');
        link.href = 'data:application/pdf;base64,' + po.approvedPdfB64;
        link.download = `PO_${(po.poNumber||po.id).replace(/[^a-zA-Z0-9]/g,'_')}_APPROVED.pdf`;
        link.click();
      };
    }
    div.appendChild(stamp);
  }
  if (po.status==='rejected') {
    const rj=state.users.find(u=>u.id===po.rejectedBy);
    const rc=document.createElement('div'); rc.className='alert alert-error'; rc.style.marginBottom='16px';
    rc.innerHTML=`<strong>PO Rejected</strong> by ${esc(rj?.name||po.rejectedBy)} on ${fmtDate(po.rejectedAt)}<br><em style="opacity:0.85">${esc(po.rejectionReason)}</em>`;
    div.appendChild(rc);
  }

  // Action buttons
  const actDiv=document.createElement('div'); actDiv.className='btn-group'; actDiv.style.marginBottom='24px';
  if (po.status==='draft'&&isRequester) {
    const b=document.createElement('button'); b.className='btn btn-blue';
    b.innerHTML=`${svgIcon('send')} Request Approval`;
    b.onclick=()=>requestApproval(po); actDiv.appendChild(b);
  }
  if (po.status==='pending'&&canApprove) {
    const groups = getApprovalGroups(po.company, po.approvalLevel);
    const needsJoint = groups.some(g => g.length > 1 && g.includes(u.login));
    const alreadyApproved = (po.approvals||[]).includes(u.login);
    if (!alreadyApproved) {
      const ba=document.createElement('button'); ba.className='btn btn-success';
      ba.innerHTML=`${svgIcon('check')} ${needsJoint ? 'Record My Approval' : 'Approve PO'}`;
      ba.onclick=()=>approvePO(po); actDiv.appendChild(ba);
      const br=document.createElement('button'); br.className='btn btn-danger';
      br.innerHTML=`${svgIcon('x')} Reject PO`;
      br.onclick=()=>{ state.modal={type:'reject',po}; render(); }; actDiv.appendChild(br);
    } else {
      const done=document.createElement('div');
      done.style.cssText='font-size:11px;color:var(--green);padding:8px 12px;border:1px solid var(--green-border);border-radius:var(--radius);background:var(--green-dim)';
      done.textContent='✓ You have already approved this PO. Waiting for other required approvers.';
      actDiv.appendChild(done);
    }
  }
  div.appendChild(actDiv);

  // History
  const poEvts=state.archive.filter(e=>e.poId===po.id).reverse();
  if (poEvts.length) {

// ============================================================
// PDF WATERMARK STAMPING (pdf-lib)
// ============================================================
async function generateApprovedPDF(po, approverName, approvedAt) {
  const { PDFDocument, rgb, degrees, StandardFonts, PageSizes } = PDFLib;

  // Use original PDF if available, otherwise create a simple summary PDF
  let pdfDoc;
  if (po.originalPdfB64) {
    const pdfBytes = Uint8Array.from(atob(po.originalPdfB64), c => c.charCodeAt(0));
    pdfDoc = await PDFDocument.load(pdfBytes, { ignoreEncryption: true });
  } else {
    // No original PDF — build a simple one-page summary
    pdfDoc = await PDFDocument.create();
    const page = pdfDoc.addPage(PageSizes.A4);
    const font = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
    const fontR = await pdfDoc.embedFont(StandardFonts.Helvetica);
    const { width, height } = page.getSize();
    const m = 50;
    let y = height - 60;

    page.drawText('PURCHASE ORDER', { x:m, y, font, size:18, color:rgb(0.05,0.1,0.18) });
    y -= 20;
    page.drawText(`PO Number: ${po.poNumber||po.id}`, { x:m, y, font:fontR, size:10, color:rgb(0.3,0.3,0.3) });
    y -= 14;
    page.drawText(`Company: ${po.company||''}`, { x:m, y, font:fontR, size:10, color:rgb(0.3,0.3,0.3) });
    y -= 14;
    page.drawText(`Supplier: ${po.supplier||''}`, { x:m, y, font:fontR, size:10, color:rgb(0.3,0.3,0.3) });
    y -= 14;
    page.drawText(`Amount: ${fmtCurrency(po.total, po.currency)}`, { x:m, y, font:fontR, size:10, color:rgb(0.3,0.3,0.3) });
  }

  const font     = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
  const fontReg  = await pdfDoc.embedFont(StandardFonts.Helvetica);
  const pages    = pdfDoc.getPages();

  for (const page of pages) {
    const { width, height } = page.getSize();

    // ── Diagonal APPROVED watermark ──────────────────────
    page.drawText('APPROVED', {
      x:        width / 2 - 160,
      y:        height / 2 - 30,
      size:     90,
      font,
      color:    rgb(0.0, 0.72, 0.27),
      opacity:  0.10,
      rotate:   degrees(45),
    });

    // ── Green approval banner at bottom of each page ─────
    const bannerH = 52;
    const bannerY = 18;

    // Green background strip
    page.drawRectangle({
      x:      18,
      y:      bannerY,
      width:  width - 36,
      height: bannerH,
      color:  rgb(0.02, 0.38, 0.12),
      opacity: 0.92,
    });

    // Green border
    page.drawRectangle({
      x:         18,
      y:         bannerY,
      width:     width - 36,
      height:    bannerH,
      borderColor: rgb(0.0, 0.72, 0.27),
      borderWidth: 1.5,
      color:     rgb(0,0,0),
      opacity:   0,
    });

    // "✓ APPROVED" text
    page.drawText('APPROVED', {
      x:      36,
      y:      bannerY + 32,
      size:   14,
      font,
      color:  rgb(0.0, 0.95, 0.45),
    });

    // Approver info
    page.drawText(`Approved by: ${approverName}`, {
      x:      36,
      y:      bannerY + 16,
      size:   8,
      font:   fontReg,
      color:  rgb(0.7, 0.95, 0.75),
    });
    page.drawText(`Date: ${fmtDateTime(approvedAt)}`, {
      x:      36,
      y:      bannerY + 6,
      size:   8,
      font:   fontReg,
      color:  rgb(0.7, 0.95, 0.75),
    });

    // PO number right-aligned
    const poLabel = `PO: ${po.poNumber||po.id}`;
    const poLabelW = font.widthOfTextAtSize(poLabel, 9);
    page.drawText(poLabel, {
      x:     width - 36 - poLabelW,
      y:     bannerY + 32,
      size:  9,
      font,
      color: rgb(0.0, 0.95, 0.45),
    });
  }

  const outBytes = await pdfDoc.save();
  return btoa(String.fromCharCode(...outBytes));
}

async function approvePO(po) {
  const u = state.currentUser;
  const now = new Date().toISOString();

  // Record this user's individual approval
  if (!po.approvals) po.approvals = [];
  if (!po.approvals.includes(u.login)) po.approvals.push(u.login);

  addEvent('approval_part', po.id, u.id, `${u.name} approved`);

  // Check if any group is now fully satisfied
  const complete = isApprovalComplete(po);

  if (complete) {
    // Final approval — all required members of a group have approved
    po.status     = 'approved';
    po.approvedBy = u.id;
    po.approvedAt = now;

    // Build approver names string for watermark
    const approvedNames = po.approvals.map(l => state.users.find(x=>x.login===l)?.name||l).join(', ');

    // Generate watermarked PDF
    try {
      po.approvedPdfB64 = await generateApprovedPDF(po, approvedNames, po.approvedAt);
    } catch(err) {
      console.error('PDF generation failed:', err);
      po.approvedPdfB64 = null;
      toast('Warning: PDF watermark generation failed.', 'error');
    }

    addEvent('approved', po.id, u.id, `PO fully approved. Approvers: ${approvedNames}`);

    const req = state.users.find(x => x.id === po.requestedBy);
    if (req) {
      const msg =
`Dear ${req.name},

Your Purchase Order has been APPROVED.

PO Number   : ${po.poNumber||po.id}
Company     : ${po.company}
Supplier    : ${po.supplier}
Project     : ${po.project||'—'}
Amount      : ${fmtCurrency(po.total, po.currency)}

Approved by : ${approvedNames}
Approved on : ${fmtDateTime(po.approvedAt)}

The approved PO with APPROVED watermark is ready for download.
Please log in to the PO Approval Tool, open this PO and click
"Download Approved PDF" to retrieve the stamped document.

— PO Approval Tool · OPTIMAL Group`;
      sendEmail(req.email, `✅ PO Approved: ${po.poNumber||po.id}`, msg, po.id);
    }
    saveState();
    toast('PO fully approved! Confirmation email sent.');
  } else {
    // Partial approval — notify remaining approvers in the same group
    const groups   = getApprovalGroups(po.company, po.approvalLevel);
    const approvedBy = po.approvals;
    // Find groups where this user's approval made progress (they're in the group)
    groups.filter(g => g.includes(u.login)).forEach(g => {
      const remaining = g.filter(l => !approvedBy.includes(l));
      remaining.forEach(login => {
        const usr = state.users.find(x=>x.login===login);
        if (usr) {
          sendEmail(usr.email, `PO Partial Approval: ${po.poNumber||po.id}`,
`Dear ${usr.name},

${u.name} has approved PO ${po.poNumber||po.id}.
Your approval is also required to complete this PO.

PO Number : ${po.poNumber||po.id}
Supplier  : ${po.supplier}
Amount    : ${fmtCurrency(po.total,po.currency)}

Please log in to the PO Approval Tool to complete the approval.

— PO Approval Tool · OPTIMAL Group`, po.id);
        }
      });
    });
    saveState();
    toast(`Your approval recorded. Waiting for remaining approvers.`);
  }
  render();
}

function rejectPO(po, reason) {
  const u=state.currentUser;
  po.status='rejected'; po.rejectedBy=u.id; po.rejectedAt=new Date().toISOString(); po.rejectionReason=reason;
  addEvent('rejected', po.id, u.id, `Rejected by ${u.name}. Reason: ${reason}`);
  const req=state.users.find(x=>x.id===po.requestedBy);
  if (req) {
    const msg =
`Dear ${req.name},

Your Purchase Order has NOT been approved.

PO Number   : ${po.poNumber||po.id}
Supplier    : ${po.supplier}
Amount      : ${fmtCurrency(po.total,po.currency)}

Rejected by : ${u.name} (${u.email})
Rejected on : ${fmtDateTime(po.rejectedAt)}

Reason:
${reason}

Please review the PO and resubmit if applicable.

— PO Approval Tool · OPTIMAL`;
    sendEmail(req.email, `❌ PO Not Approved: ${po.poNumber||po.id}`, msg, po.id);
  }
  saveState(); state.modal=null; toast('PO rejected.','error'); render();
}

function buildTimelineItem(ev) {
  const bgMap = { created:'#E6F1FB', requested:'#FAEEDA', approved:'#EAF3DE', rejected:'#FCEBEB', email:'#E1F5EE' };
  const icons  = { created:'📄', requested:'📤', approved:'✅', rejected:'❌', email:'📧' };
  const po = ev.poId ? state.pos.find(p=>p.id===ev.poId) : null;
  const item=document.createElement('div'); item.className='timeline-item';
  item.innerHTML=`
    <div class="timeline-dot" style="background:${bgMap[ev.type]||'#F0EFE9'};font-size:16px">${icons[ev.type]||'•'}</div>
    <div class="timeline-body" style="flex:1">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div class="who">${ev.type==='email'?'Email → '+esc(ev.to):(esc(ev.userName||ev.type))}</div>
        <div class="when">${fmtDateTime(ev.ts)}</div>
      </div>
      ${ev.poId?`<div style="font-size:11px;color:var(--text3);font-family:monospace;margin-top:2px">${esc(po?.poNumber||ev.poId)}</div>`:''}
      <div class="what">${ev.type==='email'?`Subject: ${esc(ev.subject)}`:(esc(ev.message||''))}</div>
    </div>`;
  return item;
}

  if (!confirm(`Remove user "${name}"?`)) return;

}

  ov.onclick=e=>{ if(e.target===ov){state.modal=null;render();} };

  if (m.type==='reject') {
    const box=document.createElement('div'); box.className='modal';
    box.innerHTML=`
      <h3>Reject PO</h3>
      <div class="modal-desc">You are rejecting <strong>${esc(m.po.poNumber||m.po.id)}</strong>. Please provide a reason — the requester will be notified by email.</div>
      <div class="form-group"><label>Rejection Reason</label><textarea id="reject-reason" rows="4" placeholder="Describe why this PO is being rejected…"></textarea></div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="state.modal=null;render()">Cancel</button>
        <button class="btn btn-danger" id="confirm-reject">${svgIcon('x')} Confirm Rejection</button>
      </div>`;
    box.querySelector('#confirm-reject').onclick=()=>{
      const reason=box.querySelector('#reject-reason').value.trim();
      if (!reason){toast('Please provide a rejection reason.','error');return;}
      rejectPO(m.po,reason);
    };
    ov.appendChild(box);
  }
  return ov;
}

// ============================================================
// API SETTINGS
// ============================================================
function renderApiSettings() {
  const div = document.createElement('div');
  div.innerHTML = `<div class="page-header"><h2>API Key</h2><p>Your Anthropic API key is used for PDF data extraction. It is stored locally in your browser only.</p></div>`;

  const card = document.createElement('div'); card.className = 'card';

  const hasKey = !!state.apiKey;
  const masked = hasKey ? ('sk-ant-' + '•'.repeat(20) + state.apiKey.slice(-4)) : '';

  card.innerHTML = `
    <div style="margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <span style="font-size:24px">${hasKey ? '🔑' : '⚠️'}</span>
        <div>
          <div style="font-weight:700;font-size:15px">${hasKey ? 'API key configured' : 'No API key set'}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px">${hasKey ? masked : 'PDF extraction will not work until you add your key.'}</div>
        </div>
      </div>
    </div>
    <div class="form-group">
      <label>Anthropic API Key</label>
      <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." value="${esc(state.apiKey)}" style="font-family:monospace">
      <p style="font-size:11px;color:var(--text3);margin-top:6px">Get your key at <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:var(--blue)">console.anthropic.com</a>. The key is saved only in this browser's localStorage and never transmitted anywhere except directly to Anthropic.</p>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" id="save-key-btn">Save Key</button>
      ${hasKey ? `<button class="btn btn-outline" id="clear-key-btn" style="color:var(--red);border-color:var(--red-light)">Remove Key</button>` : ''}
    </div>
    ${hasKey ? `<div class="alert alert-success" style="margin-top:20px">✅ PDF extraction is active. Your key ends in <code style="font-family:monospace">...${state.apiKey.slice(-4)}</code></div>` : `<div class="alert alert-warning" style="margin-top:20px">⚠️ Without an API key, PDF upload will fail and you will need to enter PO data manually.</div>`}`;

  card.querySelector('#save-key-btn').onclick = () => {
    const val = document.getElementById('api-key-input').value.trim();
    if (!val) { toast('Please enter an API key.','error'); return; }
    if (!val.startsWith('sk-ant-')) { toast('This does not look like a valid Anthropic key (should start with sk-ant-).','error'); return; }
    state.apiKey = val;
    saveState();
    toast('API key saved successfully!');
    render();
  };
  if (hasKey) {
    card.querySelector('#clear-key-btn').onclick = () => {
      if (!confirm('Remove the API key? PDF extraction will stop working.')) return;
      state.apiKey = '';
      localStorage.removeItem('po_tool_apikey');
      toast('API key removed.','error');
      render();
    };
  }

  div.appendChild(card);
  return div;
}

// SVG ICONS
// ============================================================

  const paths = {
    grid:    '<rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/>',
    upload:  '<path d="M2 10v3a1 1 0 001 1h10a1 1 0 001-1v-3M8 2v8M5 5l3-3 3 3"/>',
    file:    '<path d="M3 2h10a1 1 0 011 1v10a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z"/><path d="M5 6h6M5 9h6M5 12h3"/>',
    clock:   '<circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/>',
    archive: '<path d="M2 4a1 1 0 011-1h10a1 1 0 011 1v1a1 1 0 01-1 1H3a1 1 0 01-1-1V4z"/><path d="M3 6v7a1 1 0 001 1h8a1 1 0 001-1V6"/><path d="M6.5 9h3"/>',
    users:   '<circle cx="8" cy="5" r="3"/><path d="M2 14a6 6 0 0112 0"/>',
    settings:'<circle cx="8" cy="8" r="2"/><path d="M8 2v2M8 12v2M2 8h2M12 8h2M3.5 3.5l1.5 1.5M11 11l1.5 1.5M3.5 12.5l1.5-1.5M11 5l1.5-1.5"/>',
    logout:  '<path d="M6 3H3a1 1 0 00-1 1v8a1 1 0 001 1h3M11 10l3-2-3-2M14 8H7"/>',
    check:   '<path d="M2 8l4 4 8-8"/>',
    x:       '<path d="M3 3l10 10M13 3L3 13"/>',
    send:    '<path d="M2 8l11-5-5 11-2-4-4-2z"/>',
    key:     '<circle cx="6" cy="10" r="3"/><path d="M9 10h6M13 8v4"/>',
  };
  return `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${paths[name]||''}</svg>`;
}

// ============================================================
// INIT
// ============================================================
render();
</script>
